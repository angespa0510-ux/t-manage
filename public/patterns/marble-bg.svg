<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ange Spa ピンク大理石風背景パターン v2
  参考画像（白 + グレー脈 + ピンク脈）のトーンを再現
  1200x1200 タイル、継ぎ目なくループ
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="greyVeins" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005 0.008" numOctaves="3" seed="12" stitchTiles="stitch"/>
      <feDisplacementMap in="SourceGraphic" scale="80"/>
      <feColorMatrix values="0 0 0 0 0.72  0 0 0 0 0.70  0 0 0 0 0.75  0 0 0 2.2 -0.75"/>
    </filter>
    <filter id="lightGreyVeins" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.015" numOctaves="4" seed="23" stitchTiles="stitch"/>
      <feDisplacementMap in="SourceGraphic" scale="50"/>
      <feColorMatrix values="0 0 0 0 0.80  0 0 0 0 0.78  0 0 0 0 0.82  0 0 0 2.5 -1.0"/>
    </filter>
    <filter id="pinkVeins" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.02" numOctaves="4" seed="5" stitchTiles="stitch"/>
      <feDisplacementMap in="SourceGraphic" scale="60"/>
      <feColorMatrix values="0 0 0 0 0.91  0 0 0 0 0.55  0 0 0 0 0.62  0 0 0 3.0 -1.3"/>
    </filter>
    <filter id="pinkThreads" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.05" numOctaves="3" seed="31" stitchTiles="stitch"/>
      <feDisplacementMap in="SourceGraphic" scale="25"/>
      <feColorMatrix values="0 0 0 0 0.88  0 0 0 0 0.60  0 0 0 0 0.68  0 0 0 3.5 -1.6"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="1" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.82  0 0 0 0 0.84  0 0 0 0.06 0"/>
    </filter>
    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffe8ec" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect width="100%" height="100%" fill="url(#pinkGlow)"/>
  <rect width="100%" height="100%" filter="url(#greyVeins)" opacity="0.40"/>
  <rect width="100%" height="100%" filter="url(#lightGreyVeins)" opacity="0.35"/>
  <rect width="100%" height="100%" filter="url(#pinkVeins)" opacity="0.45"/>
  <rect width="100%" height="100%" filter="url(#pinkThreads)" opacity="0.30"/>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>
