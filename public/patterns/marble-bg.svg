<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ange Spa 大理石風背景パターン
  - 800x800のタイル、stitchTiles で継ぎ目なくループ
  - 薄いベージュ＋淡いピンクグレーの流れ
  - 不透明度低めで、コンテンツの邪魔にならない控えめな質感
-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 大きな流れを作る Turbulence -->
    <filter id="marbleSwirl" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.008" numOctaves="4" seed="7" stitchTiles="stitch"/>
      <feDisplacementMap in="SourceGraphic" scale="30"/>
      <feColorMatrix values="
        0 0 0 0 0.96
        0 0 0 0 0.93
        0 0 0 0 0.91
        0 0 0 0.18 0"/>
    </filter>

    <!-- 細かな粒状感 -->
    <filter id="marbleGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="1" stitchTiles="stitch"/>
      <feColorMatrix values="
        0 0 0 0 0.88
        0 0 0 0 0.85
        0 0 0 0 0.83
        0 0 0 0.04 0"/>
    </filter>

    <!-- ほんのりピンクの流れ（アクセント） -->
    <filter id="marblePinkFlow" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.004 0.006" numOctaves="3" seed="13" stitchTiles="stitch"/>
      <feColorMatrix values="
        0 0 0 0 0.95
        0 0 0 0 0.88
        0 0 0 0 0.90
        0 0 0 0.08 0"/>
    </filter>
  </defs>

  <!-- ベース色: 温かみのあるオフホワイト -->
  <rect width="100%" height="100%" fill="#faf8f4"/>

  <!-- 大きな脈の流れ -->
  <rect width="100%" height="100%" filter="url(#marbleSwirl)"/>

  <!-- ピンクの淡いアクセント -->
  <rect width="100%" height="100%" filter="url(#marblePinkFlow)"/>

  <!-- 粒状感で質感を追加 -->
  <rect width="100%" height="100%" filter="url(#marbleGrain)"/>
</svg>
