<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-ldf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <linearGradient id="face-ldf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8ec"/>
      <stop offset="100%" stop-color="#f5d4dc"/>
    </linearGradient>
    <radialGradient id="node-ldf">
      <stop offset="0%" stop-color="#7eb8c4"/>
      <stop offset="100%" stop-color="#4a8a9a"/>
    </radialGradient>
    <filter id="soft-ldf" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-ldf)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">FACE &amp; DECOLLETE LYMPHATIC FLOW</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">顔・デコルテのリンパ流れ</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- Left: face with lymph paths -->
  <g transform="translate(80,120)" filter="url(#soft-ldf)">
    <rect width="380" height="380" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">FACE MAP</text>
    <line x1="20" y1="40" x2="100" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- face silhouette -->
    <g transform="translate(190,200)">
      <!-- face oval -->
      <ellipse cx="0" cy="-30" rx="80" ry="100" fill="url(#face-ldf)" stroke="#d8a8b3" stroke-width="1"/>
      <!-- forehead/hairline -->
      <path d="M -70 -90 q 0 -45 70 -45 q 70 0 70 45" fill="none" stroke="#c96b83" stroke-width="0.8" opacity="0.4"/>
      <!-- eyes -->
      <ellipse cx="-25" cy="-50" rx="8" ry="3" fill="none" stroke="#c96b83" stroke-width="0.8"/>
      <ellipse cx="25" cy="-50" rx="8" ry="3" fill="none" stroke="#c96b83" stroke-width="0.8"/>
      <!-- nose -->
      <path d="M 0 -45 l -3 25 l 6 0 z" fill="none" stroke="#c96b83" stroke-width="0.8" opacity="0.5"/>
      <!-- mouth -->
      <path d="M -12 -8 q 12 6 24 0" fill="none" stroke="#c96b83" stroke-width="0.8"/>
      <!-- chin/jaw line -->
      <path d="M -70 30 q 70 80 140 0" fill="none" stroke="#c96b83" stroke-width="0.6" opacity="0.4"/>

      <!-- neck -->
      <rect x="-30" y="70" width="60" height="50" fill="url(#face-ldf)" stroke="#d8a8b3" stroke-width="1"/>
      <!-- shoulders / decollete -->
      <path d="M -100 120 q 0 -8 30 -10 l 70 0 q 30 2 30 10 l 0 30 l -130 0 z" fill="url(#face-ldf)" stroke="#d8a8b3" stroke-width="1"/>

      <!-- lymph nodes (under chin / front of ear / side of neck / clavicle) -->
      <!-- 顎下 -->
      <circle cx="-25" cy="22" r="5" fill="url(#node-ldf)"/>
      <circle cx="25" cy="22" r="5" fill="url(#node-ldf)"/>
      <!-- 耳前 (耳下腺) -->
      <circle cx="-72" cy="-20" r="5" fill="url(#node-ldf)"/>
      <circle cx="72" cy="-20" r="5" fill="url(#node-ldf)"/>
      <!-- 頸部 -->
      <circle cx="-35" cy="92" r="5" fill="url(#node-ldf)"/>
      <circle cx="35" cy="92" r="5" fill="url(#node-ldf)"/>
      <!-- 鎖骨 -->
      <circle cx="-50" cy="125" r="6" fill="url(#node-ldf)"/>
      <circle cx="50" cy="125" r="6" fill="url(#node-ldf)"/>

      <!-- flow lines (dashed) -->
      <g stroke="#c96b83" stroke-width="1" fill="none" stroke-dasharray="3 2" opacity="0.7">
        <!-- forehead → temple → ear → neck → clavicle -->
        <path d="M 0 -110 q -40 0 -55 -40 l -10 30 l 0 30 l -2 50 l 18 30"/>
        <path d="M 0 -110 q 40 0 55 -40 l 10 30 l 0 30 l 2 50 l -18 30"/>
        <!-- chin → jaw -->
        <path d="M 0 5 q -10 8 -25 17 l -8 5 l -2 65 l 16 32"/>
        <path d="M 0 5 q 10 8 25 17 l 8 5 l 2 65 l -16 32"/>
        <!-- under-eye → temple -->
        <path d="M -20 -45 q -40 0 -52 25"/>
        <path d="M 20 -45 q 40 0 52 25"/>
      </g>
    </g>

    <text x="20" y="360" font-size="9" fill="#9a7d83">顎下→耳下腺→頸部→鎖骨の順で出口を開く</text>
  </g>

  <!-- Right: order diagram -->
  <g transform="translate(490,120)" filter="url(#soft-ldf)">
    <rect width="270" height="380" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">DRAINAGE ORDER</text>
    <line x1="20" y1="40" x2="120" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- ordered flow boxes -->
    <g transform="translate(40,70)">
      <!-- 1 -->
      <rect x="0" y="0" width="190" height="36" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <circle cx="20" cy="18" r="10" fill="url(#node-ldf)"/>
      <text x="20" y="22" text-anchor="middle" font-size="11" fill="#fff">1</text>
      <text x="40" y="16" font-size="11" fill="#3a2e30">デコルテの解放</text>
      <text x="40" y="29" font-size="9" fill="#9a7d83">鎖骨ポンプ → 首側面</text>

      <path d="M 95 38 l 0 12" stroke="#c96b83" stroke-width="1"/>

      <!-- 2 -->
      <rect x="0" y="50" width="190" height="36" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <circle cx="20" cy="68" r="10" fill="url(#node-ldf)"/>
      <text x="20" y="72" text-anchor="middle" font-size="11" fill="#fff">2</text>
      <text x="40" y="66" font-size="11" fill="#3a2e30">首のリンパケア</text>
      <text x="40" y="79" font-size="9" fill="#9a7d83">耳の下→鎖骨へ</text>

      <path d="M 95 88 l 0 12" stroke="#c96b83" stroke-width="1"/>

      <!-- 3 -->
      <rect x="0" y="100" width="190" height="36" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <circle cx="20" cy="118" r="10" fill="url(#node-ldf)"/>
      <text x="20" y="122" text-anchor="middle" font-size="11" fill="#fff">3</text>
      <text x="40" y="116" font-size="11" fill="#3a2e30">顎・頬下のケア</text>
      <text x="40" y="129" font-size="9" fill="#9a7d83">中央→耳に向けて</text>

      <path d="M 95 138 l 0 12" stroke="#c96b83" stroke-width="1"/>

      <!-- 4 -->
      <rect x="0" y="150" width="190" height="36" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <circle cx="20" cy="168" r="10" fill="url(#node-ldf)"/>
      <text x="20" y="172" text-anchor="middle" font-size="11" fill="#fff">4</text>
      <text x="40" y="166" font-size="11" fill="#3a2e30">頬・目元のケア</text>
      <text x="40" y="179" font-size="9" fill="#9a7d83">頬骨上を内→外</text>

      <path d="M 95 188 l 0 12" stroke="#c96b83" stroke-width="1"/>

      <!-- 5 -->
      <rect x="0" y="200" width="190" height="36" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <circle cx="20" cy="218" r="10" fill="url(#node-ldf)"/>
      <text x="20" y="222" text-anchor="middle" font-size="11" fill="#fff">5</text>
      <text x="40" y="216" font-size="11" fill="#3a2e30">額・こめかみ</text>
      <text x="40" y="229" font-size="9" fill="#9a7d83">中央→外側へ</text>

      <path d="M 95 238 l 0 12" stroke="#c96b83" stroke-width="1"/>

      <!-- 6 -->
      <rect x="0" y="250" width="190" height="36" fill="#eab5c0" stroke="#c96b83" stroke-width="0.8"/>
      <circle cx="20" cy="268" r="10" fill="url(#node-ldf)"/>
      <text x="20" y="272" text-anchor="middle" font-size="11" fill="#fff">6</text>
      <text x="40" y="266" font-size="11" fill="#3a2e30">仕上げ</text>
      <text x="40" y="279" font-size="9" fill="#5a4a4d">額→鎖骨を再確認</text>
    </g>

    <text x="20" y="365" font-size="9" fill="#c96b83" letter-spacing="1">⚠ 目球は絶対に押さない</text>
  </g>
</svg>
