<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-ldb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <radialGradient id="node-ldb">
      <stop offset="0%" stop-color="#7eb8c4"/>
      <stop offset="100%" stop-color="#4a8a9a"/>
    </radialGradient>
    <filter id="soft-ldb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-ldb)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">LYMPH DRAINAGE — FOUR BASIC TECHNIQUES</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">リンパドレナージュ — 4つの基本手技</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- 4 technique cards -->
  <!-- Card 1: 静止圧 -->
  <g transform="translate(40,115)" filter="url(#soft-ldb)">
    <rect width="170" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="85" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">STATIONARY</text>
    <text x="85" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">① 静止圧</text>
    <line x1="70" y1="60" x2="100" y2="60" stroke="#e8849a" stroke-width="1"/>

    <!-- visual: hand held still on a node -->
    <g transform="translate(85,105)">
      <circle cx="0" cy="0" r="12" fill="url(#node-ldb)" opacity="0.85"/>
      <ellipse cx="0" cy="-2" rx="22" ry="14" fill="#fce8ec" stroke="#c96b83" stroke-width="1" opacity="0.85"/>
      <text x="0" y="35" text-anchor="middle" font-size="9" fill="#9a7d83">5秒キープ</text>
    </g>

    <text x="85" y="160" text-anchor="middle" font-size="10" fill="#3a2e30">リンパ節を開く</text>
  </g>

  <!-- Card 2: ポンプ法 -->
  <g transform="translate(220,115)" filter="url(#soft-ldb)">
    <rect width="170" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="85" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">PUMPING</text>
    <text x="85" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">② ポンプ法</text>
    <line x1="70" y1="60" x2="100" y2="60" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(85,105)">
      <ellipse cx="0" cy="5" rx="22" ry="14" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <path d="M 0 -25 l 0 10 M 0 -10 l 0 8 M 0 5 l 0 -8" fill="none" stroke="#c96b83" stroke-width="1.2" stroke-dasharray="2 2"/>
      <text x="0" y="35" text-anchor="middle" font-size="9" fill="#9a7d83">1秒1回 ×10回</text>
    </g>

    <text x="85" y="160" text-anchor="middle" font-size="10" fill="#3a2e30">節周辺に律動的に</text>
  </g>

  <!-- Card 3: ロータリー法 -->
  <g transform="translate(400,115)" filter="url(#soft-ldb)">
    <rect width="170" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="85" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">ROTARY</text>
    <text x="85" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">③ ロータリー法</text>
    <line x1="70" y1="60" x2="100" y2="60" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(85,105)">
      <ellipse cx="0" cy="0" rx="22" ry="14" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#c96b83" stroke-width="1" stroke-dasharray="3 2"/>
      <path d="M 18 -8 l 6 -2 l -2 6" fill="none" stroke="#c96b83" stroke-width="1.2"/>
      <text x="0" y="35" text-anchor="middle" font-size="9" fill="#9a7d83">直径3〜5cmの円</text>
    </g>

    <text x="85" y="160" text-anchor="middle" font-size="10" fill="#3a2e30">広い面を巻き込む</text>
  </g>

  <!-- Card 4: ストローク法 -->
  <g transform="translate(580,115)" filter="url(#soft-ldb)">
    <rect width="170" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="85" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">STROKE</text>
    <text x="85" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">④ ストローク法</text>
    <line x1="70" y1="60" x2="100" y2="60" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(85,105)">
      <ellipse cx="-30" cy="0" rx="20" ry="12" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <path d="M -10 0 l 50 0" stroke="#c96b83" stroke-width="1.5"/>
      <path d="M 40 -5 l 8 5 l -8 5" fill="none" stroke="#c96b83" stroke-width="1.5"/>
      <text x="0" y="35" text-anchor="middle" font-size="9" fill="#9a7d83">末端→中心へ</text>
    </g>

    <text x="85" y="160" text-anchor="middle" font-size="10" fill="#3a2e30">流す・仕上げ</text>
  </g>

  <!-- Lower section: 出口を開く順序 -->
  <g transform="translate(40,320)" filter="url(#soft-ldb)">
    <rect width="720" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">OPEN-THEN-FLOW PRINCIPLE — 出口を開けてから流す</text>
    <line x1="20" y1="40" x2="240" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- flow chain -->
    <g transform="translate(50,90)">
      <!-- step 1 -->
      <circle cx="0" cy="0" r="22" fill="url(#node-ldb)" opacity="0.85"/>
      <text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff">①</text>
      <text x="0" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">鎖骨</text>
      <text x="0" y="56" text-anchor="middle" font-size="9" fill="#9a7d83">最終出口</text>

      <path d="M 30 0 l 100 0" stroke="#c96b83" stroke-width="1.2" stroke-dasharray="3 2"/>
      <path d="M 130 -4 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1.2"/>

      <!-- step 2 -->
      <circle cx="160" cy="0" r="20" fill="url(#node-ldb)" opacity="0.7"/>
      <text x="160" y="4" text-anchor="middle" font-size="10" fill="#fff">②</text>
      <text x="160" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">該当節</text>
      <text x="160" y="56" text-anchor="middle" font-size="9" fill="#9a7d83">腋窩/鼠径/顎下</text>

      <path d="M 188 0 l 100 0" stroke="#c96b83" stroke-width="1.2" stroke-dasharray="3 2"/>
      <path d="M 288 -4 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1.2"/>

      <!-- step 3 -->
      <circle cx="320" cy="0" r="18" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <text x="320" y="4" text-anchor="middle" font-size="10" fill="#c96b83">③</text>
      <text x="320" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">末端から流す</text>
      <text x="320" y="56" text-anchor="middle" font-size="9" fill="#9a7d83">皮膚直下を優しく</text>

      <path d="M 348 0 l 100 0" stroke="#c96b83" stroke-width="1.2" stroke-dasharray="3 2"/>
      <path d="M 448 -4 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1.2"/>

      <!-- step 4 -->
      <circle cx="480" cy="0" r="20" fill="url(#node-ldb)" opacity="0.85"/>
      <text x="480" y="4" text-anchor="middle" font-size="10" fill="#fff">④</text>
      <text x="480" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">鎖骨へ</text>
      <text x="480" y="56" text-anchor="middle" font-size="9" fill="#9a7d83">仕上げ</text>

      <!-- end note -->
      <g transform="translate(540,-20)">
        <rect x="0" y="0" width="120" height="44" fill="#fdf0f3" stroke="#e8849a55"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">⚠ 圧は最弱</text>
        <text x="60" y="32" text-anchor="middle" font-size="9" fill="#9a7d83">皮膚を伸ばす程度</text>
      </g>
    </g>

    <text x="20" y="160" font-size="9" fill="#9a7d83">※ 圧が強すぎるとリンパ管がつぶれて逆効果。「これで効いているか不安」くらいの圧が正解。</text>
  </g>
</svg>
