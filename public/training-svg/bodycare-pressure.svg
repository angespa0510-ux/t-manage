<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <filter id="soft-bp" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-bp)"/>

  <!-- title -->
  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">PRESSURE &amp; KNEADING TECHNIQUES</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">圧迫法と揉捏法 — 二大基本手技</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- 2 panels side by side: 圧迫法 / 揉捏法 -->
  <!-- Panel 1: 圧迫法 -->
  <g transform="translate(50,115)" filter="url(#soft-bp)">
    <rect width="340" height="240" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="34" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">TECHNIQUE 01</text>
    <text x="20" y="60" font-size="18" fill="#3a2e30" letter-spacing="2">圧迫法（あっぱくほう）</text>
    <line x1="20" y1="72" x2="80" y2="72" stroke="#e8849a" stroke-width="1"/>

    <!-- visual: hand pressing down with arrow -->
    <g transform="translate(170,135)">
      <!-- muscle (oval underneath) -->
      <ellipse cx="0" cy="40" rx="80" ry="20" fill="#fce8ec" stroke="#d8a8b3" stroke-width="1"/>
      <!-- hand pressing down -->
      <ellipse cx="0" cy="-5" rx="38" ry="22" fill="#f5d4dc" stroke="#c96b83" stroke-width="1.2"/>
      <!-- finger lines -->
      <path d="M -28 -12 q 0 -18 8 -22 M -10 -16 q 0 -22 4 -26 M 8 -16 q 0 -22 -4 -26 M 24 -12 q 0 -18 -8 -22" fill="none" stroke="#c96b83" stroke-width="1"/>
      <!-- downward pressure arrow -->
      <path d="M 0 -45 l 0 30 M -6 -22 l 6 8 l 6 -8" fill="none" stroke="#c96b83" stroke-width="1.5"/>
      <text x="0" y="-55" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">垂直に</text>
    </g>

    <text x="20" y="210" font-size="11" fill="#5a4a4d">3〜5秒キープ・ゆっくり離す</text>
    <text x="20" y="226" font-size="10" fill="#9a7d83">深部の緊張を持続的に緩める</text>
  </g>

  <!-- Panel 2: 揉捏法 -->
  <g transform="translate(410,115)" filter="url(#soft-bp)">
    <rect width="340" height="240" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="34" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">TECHNIQUE 02</text>
    <text x="20" y="60" font-size="18" fill="#3a2e30" letter-spacing="2">揉捏法（じゅうねつほう）</text>
    <line x1="20" y1="72" x2="80" y2="72" stroke="#e8849a" stroke-width="1"/>

    <!-- visual: hand pinching/grasping with rotational arrows -->
    <g transform="translate(170,135)">
      <!-- muscle being lifted -->
      <ellipse cx="0" cy="40" rx="80" ry="20" fill="#fce8ec" stroke="#d8a8b3" stroke-width="1"/>
      <!-- pinching hand fingers -->
      <ellipse cx="-20" cy="0" rx="22" ry="14" fill="#f5d4dc" stroke="#c96b83" stroke-width="1.2"/>
      <ellipse cx="20" cy="0" rx="22" ry="14" fill="#f5d4dc" stroke="#c96b83" stroke-width="1.2"/>
      <!-- circular motion arrows -->
      <path d="M -50 -10 q -10 20 0 40 q 10 -10 20 -10" fill="none" stroke="#c96b83" stroke-width="1.5" stroke-dasharray="3 2"/>
      <path d="M 50 -10 q 10 20 0 40 q -10 -10 -20 -10" fill="none" stroke="#c96b83" stroke-width="1.5" stroke-dasharray="3 2"/>
      <text x="0" y="-30" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">揉む・回す・絞る</text>
    </g>

    <text x="20" y="210" font-size="11" fill="#5a4a4d">筋肉ごと持ち上げ動かす</text>
    <text x="20" y="226" font-size="10" fill="#9a7d83">血流促進・代謝の活性化</text>
  </g>

  <!-- pressure scale at bottom -->
  <g transform="translate(80,390)">
    <text x="0" y="-10" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">PRESSURE SCALE — 圧の段階表現</text>
    <line x1="0" y1="0" x2="640" y2="0" stroke="#e8849a55" stroke-width="1"/>
    <!-- 5 bars -->
    <g>
      <rect x="0" y="20" width="120" height="36" fill="#fdf6f7" stroke="#e8849a55"/>
      <rect x="130" y="20" width="120" height="36" fill="#fbe7ea" stroke="#e8849a55"/>
      <rect x="260" y="20" width="120" height="36" fill="#f5d0d7" stroke="#e8849a55"/>
      <rect x="390" y="20" width="120" height="36" fill="#eab5c0" stroke="#c96b83"/>
      <rect x="520" y="20" width="120" height="36" fill="#d68a9a" stroke="#c96b83"/>

      <text x="60" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">レベル 1</text>
      <text x="60" y="55" text-anchor="middle" font-size="9" fill="#9a7d83">ソフト</text>

      <text x="190" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">レベル 2</text>
      <text x="190" y="55" text-anchor="middle" font-size="9" fill="#9a7d83">やや弱め</text>

      <text x="320" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">レベル 3</text>
      <text x="320" y="55" text-anchor="middle" font-size="9" fill="#9a7d83">普通</text>

      <text x="450" y="42" text-anchor="middle" font-size="10" fill="#3a2e30">レベル 4</text>
      <text x="450" y="55" text-anchor="middle" font-size="9" fill="#fff">しっかり</text>

      <text x="580" y="42" text-anchor="middle" font-size="10" fill="#fff">レベル 5</text>
      <text x="580" y="55" text-anchor="middle" font-size="9" fill="#fff">強め</text>
    </g>
  </g>

  <!-- combination flow at the bottom -->
  <g transform="translate(80,485)">
    <text x="0" y="0" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">COMBINATION — 圧迫法 → 揉捏法 → 圧迫法 の往復で深部まで届く</text>
    <line x1="0" y1="10" x2="640" y2="10" stroke="#e8849a" stroke-width="0.6"/>
  </g>
</svg>
