<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-bflow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <filter id="soft-bflow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-bflow)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">FULL BODY 60 MIN STANDARD FLOW</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">全身ボディケア — 60分標準フロー</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- Phase 1 (Prone) -->
  <g transform="translate(50,120)" filter="url(#soft-bflow)">
    <rect width="700" height="170" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">PHASE 01 — うつ伏せ（29 分）</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- timeline blocks -->
    <g transform="translate(30,55)">
      <!-- block: オイル+足首 5min -->
      <rect x="0" y="0" width="60" height="44" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="30" y="18" text-anchor="middle" font-size="9" fill="#5a4a4d">オイル</text>
      <text x="30" y="30" text-anchor="middle" font-size="9" fill="#5a4a4d">足首から</text>
      <text x="30" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">5分</text>

      <!-- block: ふくらはぎ太もも裏 8min -->
      <rect x="65" y="0" width="96" height="44" fill="#fbe7ea" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="113" y="22" text-anchor="middle" font-size="9" fill="#5a4a4d">ふくらはぎ</text>
      <text x="113" y="34" text-anchor="middle" font-size="9" fill="#5a4a4d">太もも裏</text>
      <text x="113" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">8分</text>

      <!-- block: 大殿筋・腰部 5min -->
      <rect x="166" y="0" width="60" height="44" fill="#f5d0d7" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="196" y="18" text-anchor="middle" font-size="9" fill="#5a4a4d">大殿筋</text>
      <text x="196" y="30" text-anchor="middle" font-size="9" fill="#5a4a4d">腰部</text>
      <text x="196" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">5分</text>

      <!-- block: 背中 (LARGEST) 10min -->
      <rect x="231" y="0" width="120" height="44" fill="#eab5c0" stroke="#c96b83" stroke-width="0.8"/>
      <text x="291" y="22" text-anchor="middle" font-size="10" fill="#3a2e30">背中（中心）</text>
      <text x="291" y="36" text-anchor="middle" font-size="9" fill="#3a2e30">広背筋・脊柱起立筋</text>
      <text x="291" y="48" text-anchor="middle" font-size="8" fill="#fff">10分</text>

      <!-- block: 肩首 5min -->
      <rect x="356" y="0" width="60" height="44" fill="#f5d0d7" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="386" y="22" text-anchor="middle" font-size="9" fill="#5a4a4d">肩・首</text>
      <text x="386" y="34" text-anchor="middle" font-size="9" fill="#5a4a4d">肩甲骨周辺</text>
      <text x="386" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">5分</text>
    </g>

    <text x="20" y="125" font-size="9" fill="#9a7d83">▼ ポイント: 摩擦法 → 揉捏法 → 圧迫法 → 振動法 → 揉捏法 → 軽叩打 → 摩擦法</text>
    <text x="20" y="145" font-size="9" fill="#c96b83" letter-spacing="1">⚠ 脊柱の真上は絶対に押さない・両脇の起立筋へ</text>
  </g>

  <!-- transition arrow -->
  <g transform="translate(400,302)">
    <path d="M 0 0 l 0 14 M -5 8 l 5 6 l 5 -6" fill="none" stroke="#c96b83" stroke-width="1.2"/>
    <text x="20" y="11" font-size="9" fill="#c96b83">体勢チェンジ 1分</text>
  </g>

  <!-- Phase 2 (Supine) -->
  <g transform="translate(50,328)" filter="url(#soft-bflow)">
    <rect width="700" height="170" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">PHASE 02 — 仰向け（24 分）</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(30,55)">
      <!-- block: 脚前面・足の甲 8min -->
      <rect x="0" y="0" width="96" height="44" fill="#fbe7ea" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="48" y="22" text-anchor="middle" font-size="9" fill="#5a4a4d">脚の前面</text>
      <text x="48" y="34" text-anchor="middle" font-size="9" fill="#5a4a4d">足の甲</text>
      <text x="48" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">8分</text>

      <!-- block: 腕・手 5min -->
      <rect x="101" y="0" width="60" height="44" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="131" y="18" text-anchor="middle" font-size="9" fill="#5a4a4d">腕・手</text>
      <text x="131" y="30" text-anchor="middle" font-size="8" fill="#9a7d83">指1本ずつ</text>
      <text x="131" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">5分</text>

      <!-- block: デコルテ 3min -->
      <rect x="166" y="0" width="36" height="44" fill="#fdf0f3" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="184" y="22" text-anchor="middle" font-size="9" fill="#5a4a4d">デコルテ</text>
      <text x="184" y="34" text-anchor="middle" font-size="9" fill="#5a4a4d">首前面</text>
      <text x="184" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">3分</text>

      <!-- block: 顔・頭皮 (希望者のみ) 3min -->
      <rect x="207" y="0" width="36" height="44" fill="#fdf0f3" stroke="#d8a8b3" stroke-width="0.6" stroke-dasharray="2 2"/>
      <text x="225" y="22" text-anchor="middle" font-size="9" fill="#5a4a4d">顔・</text>
      <text x="225" y="34" text-anchor="middle" font-size="9" fill="#5a4a4d">頭皮</text>
      <text x="225" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">3分</text>

      <!-- block: 仕上げ -->
      <rect x="248" y="0" width="36" height="44" fill="#f5d0d7" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="266" y="22" text-anchor="middle" font-size="9" fill="#5a4a4d">仕上げ</text>
      <text x="266" y="34" text-anchor="middle" font-size="9" fill="#5a4a4d">お声かけ</text>
      <text x="266" y="40" text-anchor="middle" font-size="8" fill="#9a7d83">1分</text>
    </g>

    <text x="20" y="125" font-size="9" fill="#9a7d83">▼ ポイント: 顔・頭皮はメイクや希望を必ず確認・敏感な皮膚は最弱の圧で</text>
    <text x="20" y="145" font-size="9" fill="#c96b83" letter-spacing="1">⚠ 動脈拍動部・甲状腺前面は触らない・腹部は時計回り・強圧禁忌</text>
  </g>
</svg>
