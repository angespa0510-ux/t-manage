<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-bpos" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <linearGradient id="body-bpos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8ec"/>
      <stop offset="100%" stop-color="#f5d4dc"/>
    </linearGradient>
    <filter id="soft-bpos" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-bpos)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">POSITIONING GUIDE</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">体勢別の施術ポイント</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- 3 panels: prone / supine / side-lying -->
  <!-- Panel 1: Prone -->
  <g transform="translate(40,115)" filter="url(#soft-bpos)">
    <rect width="240" height="380" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="120" y="32" text-anchor="middle" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">POSITION 01 — PRONE</text>
    <text x="120" y="58" text-anchor="middle" font-size="16" fill="#3a2e30" letter-spacing="2">うつ伏せ</text>
    <line x1="100" y1="68" x2="140" y2="68" stroke="#e8849a" stroke-width="1"/>

    <!-- bed + body lying face down -->
    <g transform="translate(120,150)">
      <!-- bed -->
      <rect x="-80" y="20" width="160" height="14" fill="#ede0e3" stroke="#d8a8b3" stroke-width="0.8"/>
      <!-- body -->
      <g fill="url(#body-bpos)" stroke="#c96b83" stroke-width="1">
        <!-- head (face down circle) -->
        <ellipse cx="-58" cy="14" rx="10" ry="8"/>
        <!-- body length -->
        <rect x="-50" y="6" width="115" height="18" rx="4"/>
        <!-- legs -->
        <rect x="50" y="8" width="22" height="14" rx="2"/>
      </g>
      <!-- breathing hole circle -->
      <circle cx="-58" cy="34" r="4" fill="#fdf6f7" stroke="#d8a8b3" stroke-width="0.8"/>
      <!-- ankle roll -->
      <rect x="64" y="22" width="14" height="10" rx="3" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.8"/>
      <text x="71" y="48" text-anchor="middle" font-size="7" fill="#9a7d83">ロール</text>
    </g>

    <text x="20" y="220" font-size="11" fill="#c96b83" letter-spacing="1">アクセス可能部位</text>
    <line x1="20" y1="228" x2="220" y2="228" stroke="#e8849a55" stroke-width="0.6"/>
    <text x="20" y="245" font-size="10" fill="#3a2e30">・背中全体（首〜腰）</text>
    <text x="20" y="262" font-size="10" fill="#3a2e30">・肩甲骨周辺</text>
    <text x="20" y="279" font-size="10" fill="#3a2e30">・腰・大殿筋</text>
    <text x="20" y="296" font-size="10" fill="#3a2e30">・太もも裏・ふくらはぎ</text>
    <text x="20" y="313" font-size="10" fill="#3a2e30">・足底</text>

    <text x="20" y="345" font-size="9" fill="#c96b83" letter-spacing="1">⚠ 妊娠5ヶ月以降は禁忌</text>
    <text x="20" y="362" font-size="9" fill="#9a7d83">顔の負担を時々確認</text>
  </g>

  <!-- Panel 2: Supine -->
  <g transform="translate(290,115)" filter="url(#soft-bpos)">
    <rect width="240" height="380" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="120" y="32" text-anchor="middle" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">POSITION 02 — SUPINE</text>
    <text x="120" y="58" text-anchor="middle" font-size="16" fill="#3a2e30" letter-spacing="2">仰向け</text>
    <line x1="100" y1="68" x2="140" y2="68" stroke="#e8849a" stroke-width="1"/>

    <!-- supine body -->
    <g transform="translate(120,150)">
      <rect x="-80" y="20" width="160" height="14" fill="#ede0e3" stroke="#d8a8b3" stroke-width="0.8"/>
      <g fill="url(#body-bpos)" stroke="#c96b83" stroke-width="1">
        <ellipse cx="-58" cy="14" rx="10" ry="8"/>
        <!-- face features -->
        <circle cx="-60" cy="13" r="0.8" fill="#c96b83"/>
        <circle cx="-56" cy="13" r="0.8" fill="#c96b83"/>
        <rect x="-50" y="6" width="115" height="18" rx="4"/>
        <rect x="50" y="8" width="22" height="14" rx="2"/>
      </g>
      <!-- knee roll -->
      <rect x="48" y="22" width="14" height="10" rx="3" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.8"/>
      <text x="55" y="48" text-anchor="middle" font-size="7" fill="#9a7d83">ロール</text>
      <!-- neck towel -->
      <rect x="-46" y="22" width="10" height="6" rx="2" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.8"/>
    </g>

    <text x="20" y="220" font-size="11" fill="#c96b83" letter-spacing="1">アクセス可能部位</text>
    <line x1="20" y1="228" x2="220" y2="228" stroke="#e8849a55" stroke-width="0.6"/>
    <text x="20" y="245" font-size="10" fill="#3a2e30">・顔・頭皮</text>
    <text x="20" y="262" font-size="10" fill="#3a2e30">・デコルテ・首前面</text>
    <text x="20" y="279" font-size="10" fill="#3a2e30">・腕・手</text>
    <text x="20" y="296" font-size="10" fill="#3a2e30">・腹部（適切な場合）</text>
    <text x="20" y="313" font-size="10" fill="#3a2e30">・太もも前・脛・足の甲</text>

    <text x="20" y="345" font-size="9" fill="#c96b83" letter-spacing="1">膝下ロール+首タオル必須</text>
    <text x="20" y="362" font-size="9" fill="#9a7d83">手のひら上向き=リラックス姿勢</text>
  </g>

  <!-- Panel 3: Side-lying -->
  <g transform="translate(540,115)" filter="url(#soft-bpos)">
    <rect width="240" height="380" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="120" y="32" text-anchor="middle" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">POSITION 03 — SIDE LYING</text>
    <text x="120" y="58" text-anchor="middle" font-size="16" fill="#3a2e30" letter-spacing="2">横向き</text>
    <line x1="100" y1="68" x2="140" y2="68" stroke="#e8849a" stroke-width="1"/>

    <!-- side-lying body -->
    <g transform="translate(120,150)">
      <rect x="-80" y="22" width="160" height="14" fill="#ede0e3" stroke="#d8a8b3" stroke-width="0.8"/>
      <g fill="url(#body-bpos)" stroke="#c96b83" stroke-width="1">
        <!-- head profile -->
        <ellipse cx="-60" cy="14" rx="9" ry="9"/>
        <!-- body curve (s-shape) -->
        <path d="M -50 8 q -2 8 4 14 l 60 0 q 8 0 14 -6 l 20 0 q 8 0 8 8 l 0 0 q 0 4 -4 4 l -94 0 q -10 0 -10 -10 z"/>
      </g>
      <!-- pillow under head -->
      <rect x="-72" y="14" width="14" height="10" rx="3" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.8"/>
      <text x="-65" y="40" text-anchor="middle" font-size="7" fill="#9a7d83">枕</text>
      <!-- pillow between knees -->
      <rect x="38" y="20" width="14" height="10" rx="3" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.8"/>
      <text x="45" y="46" text-anchor="middle" font-size="7" fill="#9a7d83">膝間</text>
    </g>

    <text x="20" y="220" font-size="11" fill="#c96b83" letter-spacing="1">適応ケース</text>
    <line x1="20" y1="228" x2="220" y2="228" stroke="#e8849a55" stroke-width="0.6"/>
    <text x="20" y="245" font-size="10" fill="#3a2e30">・妊娠5ヶ月以降のお客様</text>
    <text x="20" y="262" font-size="10" fill="#3a2e30">・うつ伏せが困難な腰痛の方</text>
    <text x="20" y="279" font-size="10" fill="#3a2e30">・高齢のお客様</text>
    <text x="20" y="296" font-size="10" fill="#3a2e30">・上側の肩・腰へアクセス</text>
    <text x="20" y="313" font-size="10" fill="#3a2e30">・抱き枕で安定感UP</text>

    <text x="20" y="345" font-size="9" fill="#c96b83" letter-spacing="1">妊婦は左側を下に</text>
    <text x="20" y="362" font-size="9" fill="#9a7d83">下大静脈圧迫を避ける</text>
  </g>
</svg>
