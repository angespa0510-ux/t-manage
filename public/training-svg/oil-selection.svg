<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-os" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <marker id="arrow-os" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#c96b83"/>
    </marker>
  </defs>

  <rect width="800" height="580" fill="url(#bg-os)"/>

  <text x="400" y="42" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">OIL SELECTION GUIDE</text>
  <text x="400" y="72" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">オイルの選び方フローチャート</text>
  <line x1="370" y1="86" x2="430" y2="86" stroke="#e8849a" stroke-width="1"/>

  <!-- ====== Step 1: お客様の肌質 ====== -->
  <g transform="translate(330, 110)">
    <rect width="140" height="60" rx="0" fill="#c96b83" stroke="#c96b83" stroke-width="1.5"/>
    <text x="70" y="26" text-anchor="middle" font-size="10" letter-spacing="3" fill="#fdf6f7" font-weight="500">START</text>
    <text x="70" y="46" text-anchor="middle" font-size="13" letter-spacing="2" fill="#ffffff" font-weight="500">お客様の肌質は？</text>
  </g>

  <!-- arrows down to 3 branches -->
  <path d="M 400 170 l 0 30" stroke="#c96b83" stroke-width="1.5" fill="none"/>
  <path d="M 400 200 l -200 0 l 0 20" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>
  <path d="M 400 200 l 0 20" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>
  <path d="M 400 200 l 200 0 l 0 20" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>

  <!-- 3 skin type branches -->
  <g transform="translate(140, 220)">
    <rect width="120" height="50" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" font-size="11" fill="#3a2e30" font-weight="500" letter-spacing="2">乾燥肌</text>
    <text x="60" y="38" text-anchor="middle" font-size="9" fill="#9a7d83">敏感・カサつき</text>
  </g>

  <g transform="translate(340, 220)">
    <rect width="120" height="50" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" font-size="11" fill="#3a2e30" font-weight="500" letter-spacing="2">普通肌</text>
    <text x="60" y="38" text-anchor="middle" font-size="9" fill="#9a7d83">トラブル少なめ</text>
  </g>

  <g transform="translate(540, 220)">
    <rect width="120" height="50" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" font-size="11" fill="#3a2e30" font-weight="500" letter-spacing="2">脂性肌</text>
    <text x="60" y="38" text-anchor="middle" font-size="9" fill="#9a7d83">テカリ・ベタつき</text>
  </g>

  <!-- arrows down to oils -->
  <path d="M 200 270 l 0 28" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>
  <path d="M 400 270 l 0 28" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>
  <path d="M 600 270 l 0 28" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>

  <!-- recommended oils -->
  <g transform="translate(140, 300)">
    <rect width="120" height="80" fill="#fdeaee" stroke="#c96b83" stroke-width="1.2"/>
    <text x="60" y="22" text-anchor="middle" font-size="10" letter-spacing="2" fill="#c96b83" font-weight="500">RECOMMENDED</text>
    <text x="60" y="44" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="1">スイート</text>
    <text x="60" y="60" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="1">アーモンド</text>
    <text x="60" y="74" text-anchor="middle" font-size="9" fill="#9a7d83">高保湿で守る</text>
  </g>

  <g transform="translate(340, 300)">
    <rect width="120" height="80" fill="#fdeaee" stroke="#c96b83" stroke-width="1.2"/>
    <text x="60" y="22" text-anchor="middle" font-size="10" letter-spacing="2" fill="#c96b83" font-weight="500">RECOMMENDED</text>
    <text x="60" y="44" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="1">ホホバ</text>
    <text x="60" y="60" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="1">オイル</text>
    <text x="60" y="74" text-anchor="middle" font-size="9" fill="#9a7d83">皮脂と相性◎</text>
  </g>

  <g transform="translate(540, 300)">
    <rect width="120" height="80" fill="#fdeaee" stroke="#c96b83" stroke-width="1.2"/>
    <text x="60" y="22" text-anchor="middle" font-size="10" letter-spacing="2" fill="#c96b83" font-weight="500">RECOMMENDED</text>
    <text x="60" y="44" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="1">グレープ</text>
    <text x="60" y="60" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="1">シード</text>
    <text x="60" y="74" text-anchor="middle" font-size="9" fill="#9a7d83">軽くサラッと</text>
  </g>

  <!-- ===== Step 2: お客様の希望は？ ===== -->
  <g transform="translate(330, 410)">
    <rect width="140" height="60" fill="#c96b83" stroke="#c96b83" stroke-width="1.5"/>
    <text x="70" y="26" text-anchor="middle" font-size="10" letter-spacing="3" fill="#fdf6f7" font-weight="500">+ ESSENTIAL OIL</text>
    <text x="70" y="46" text-anchor="middle" font-size="13" letter-spacing="2" fill="#ffffff" font-weight="500">+ 香りの希望は？</text>
  </g>

  <path d="M 400 470 l 0 20" stroke="#c96b83" stroke-width="1.5" fill="none"/>
  <path d="M 400 490 l -200 0 l 0 16" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>
  <path d="M 400 490 l 0 16" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>
  <path d="M 400 490 l 200 0 l 0 16" stroke="#c96b83" stroke-width="1.5" fill="none" marker-end="url(#arrow-os)"/>

  <g transform="translate(140, 506)">
    <rect width="120" height="56" fill="#fffaeb" stroke="#b9a8d4" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" fill="#3a2e30" font-weight="500" letter-spacing="2">リラックス</text>
    <text x="60" y="36" text-anchor="middle" font-size="11" fill="#7a6890" font-weight="500">＋ ラベンダー</text>
    <text x="60" y="50" text-anchor="middle" font-size="9" fill="#9a7d83">寝る前・疲労時</text>
  </g>

  <g transform="translate(340, 506)">
    <rect width="120" height="56" fill="#fffaeb" stroke="#d6a06a" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" fill="#3a2e30" font-weight="500" letter-spacing="2">気分転換</text>
    <text x="60" y="36" text-anchor="middle" font-size="11" fill="#b07a30" font-weight="500">＋ オレンジ</text>
    <text x="60" y="50" text-anchor="middle" font-size="9" fill="#9a7d83">日中・元気が欲しい時</text>
  </g>

  <g transform="translate(540, 506)">
    <rect width="120" height="56" fill="#fffaeb" stroke="#7eb89a" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" fill="#3a2e30" font-weight="500" letter-spacing="2">頭痛・凝り</text>
    <text x="60" y="36" text-anchor="middle" font-size="11" fill="#4a8064" font-weight="500">＋ ペパーミント</text>
    <text x="60" y="50" text-anchor="middle" font-size="9" fill="#9a7d83">肩首集中ケア</text>
  </g>

  <!-- caution box right side -->
  <g transform="translate(680, 110)">
    <rect width="100" height="280" fill="#ffffff" stroke="#c96b83" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" font-size="9" letter-spacing="3" fill="#c96b83" font-weight="500">⚠ CAUTION</text>
    <text x="50" y="42" text-anchor="middle" font-size="10" fill="#3a2e30" font-weight="500">使用前確認</text>

    <g font-size="9" fill="#3a2e30" letter-spacing="0.3">
      <text x="10" y="68">・アレルギー</text>
      <text x="10" y="84">　（ナッツ等）</text>
      <text x="10" y="108">・妊娠中の方</text>
      <text x="10" y="124">　（精油は避ける）</text>
      <text x="10" y="148">・既往疾患</text>
      <text x="10" y="164">　（高血圧等）</text>
      <text x="10" y="188">・パッチテスト</text>
      <text x="10" y="204">　（敏感肌）</text>
      <text x="10" y="228">・皮膚の傷</text>
      <text x="10" y="244">　（避ける）</text>
    </g>

    <text x="50" y="270" text-anchor="middle" font-size="8" fill="#9a7d83" letter-spacing="0.5">困ったら相談</text>
  </g>
</svg>
