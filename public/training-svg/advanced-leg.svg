<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-aleg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <linearGradient id="leg-aleg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8ec"/>
      <stop offset="100%" stop-color="#f5d4dc"/>
    </linearGradient>
    <radialGradient id="node-aleg">
      <stop offset="0%" stop-color="#7eb8c4"/>
      <stop offset="100%" stop-color="#4a8a9a"/>
    </radialGradient>
    <filter id="soft-aleg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-aleg)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">LEG &amp; EDEMA INTENSIVE CARE</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">脚部・むくみの集中ケア</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- Top: edema progression stages -->
  <g transform="translate(40,115)" filter="url(#soft-aleg)">
    <rect width="720" height="160" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">EDEMA PROGRESSION — むくみの段階</text>
    <line x1="20" y1="40" x2="240" y2="40" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(40,55)">
      <!-- Stage 1: 一時的 -->
      <rect x="0" y="0" width="200" height="90" fill="#fdf0f3" stroke="#e8849a55"/>
      <text x="15" y="20" font-size="10" letter-spacing="2" fill="#c96b83">STAGE 01</text>
      <text x="15" y="40" font-size="12" fill="#3a2e30">一時的</text>
      <line x1="15" y1="48" x2="55" y2="48" stroke="#e8849a" stroke-width="0.6"/>
      <text x="15" y="65" font-size="10" fill="#5a4a4d">夕方の脚の重さ</text>
      <text x="15" y="80" font-size="9" fill="#9a7d83">改善期間: 一晩で</text>

      <path d="M 205 45 l 14 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 215 41 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Stage 2: 慢性 -->
      <rect x="220" y="0" width="200" height="90" fill="#fbe7ea" stroke="#c96b83" stroke-width="0.6"/>
      <text x="235" y="20" font-size="10" letter-spacing="2" fill="#c96b83">STAGE 02</text>
      <text x="235" y="40" font-size="12" fill="#3a2e30">慢性</text>
      <line x1="235" y1="48" x2="275" y2="48" stroke="#e8849a" stroke-width="0.6"/>
      <text x="235" y="65" font-size="10" fill="#5a4a4d">朝も解消されない</text>
      <text x="235" y="80" font-size="9" fill="#9a7d83">改善期間: 数日〜1週間</text>

      <path d="M 425 45 l 14 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 435 41 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Stage 3: 重度 (medical) -->
      <rect x="440" y="0" width="200" height="90" fill="#fbe7ea" stroke="#c96b83" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="455" y="20" font-size="10" letter-spacing="2" fill="#c96b83">STAGE 03 ⚠</text>
      <text x="455" y="40" font-size="12" fill="#3a2e30">重度（医療領域）</text>
      <line x1="455" y1="48" x2="525" y2="48" stroke="#c96b83" stroke-width="0.6"/>
      <text x="455" y="65" font-size="10" fill="#5a4a4d">押すと跡が残る</text>
      <text x="455" y="80" font-size="9" fill="#9a7d83">専門医の診断必須</text>
    </g>
  </g>

  <!-- Bottom left: leg with calf highlighted -->
  <g transform="translate(40,295)" filter="url(#soft-aleg)">
    <rect width="350" height="220" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">SECOND HEART — 第二の心臓</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- standing leg view -->
    <g transform="translate(175,130)">
      <!-- inguinal node -->
      <circle cx="0" cy="-50" r="6" fill="url(#node-aleg)"/>
      <text x="14" y="-46" font-size="9" fill="#4a8a9a">鼠径節</text>

      <!-- thigh -->
      <path d="M -14 -45 l 4 50 l 16 0 l 4 -50 z" fill="url(#leg-aleg)" stroke="#d8a8b3" stroke-width="1"/>

      <!-- knee -->
      <ellipse cx="0" cy="10" rx="11" ry="6" fill="url(#leg-aleg)" stroke="#d8a8b3" stroke-width="1"/>
      <circle cx="0" cy="10" r="3" fill="url(#node-aleg)" opacity="0.7"/>
      <text x="14" y="13" font-size="8" fill="#4a8a9a">膝窩節</text>

      <!-- calf (highlighted) -->
      <path d="M -10 16 q -4 30 -2 60 l 24 0 q 2 -30 -2 -60 z" fill="#eab5c0" stroke="#c96b83" stroke-width="1.2"/>
      <!-- pump arrows on calf -->
      <path d="M 0 25 l 0 50" stroke="#c96b83" stroke-width="1.5" stroke-dasharray="3 2"/>
      <path d="M -4 35 l 4 -8 l 4 8" fill="none" stroke="#c96b83" stroke-width="1.2"/>
      <path d="M -4 55 l 4 -8 l 4 8" fill="none" stroke="#c96b83" stroke-width="1.2"/>

      <!-- ankle and foot -->
      <ellipse cx="0" cy="80" rx="9" ry="5" fill="url(#leg-aleg)" stroke="#d8a8b3" stroke-width="1"/>
      <path d="M -10 80 q 0 16 10 18 l 14 -2 l 0 -10 l -2 -10 z" fill="url(#leg-aleg)" stroke="#d8a8b3" stroke-width="1"/>

      <!-- label for calf -->
      <line x1="14" y1="50" x2="60" y2="50" stroke="#c96b83" stroke-width="0.5"/>
      <text x="65" y="48" font-size="10" fill="#c96b83">ふくらはぎ</text>
      <text x="65" y="62" font-size="9" fill="#9a7d83">腓腹筋・ヒラメ筋</text>

      <!-- upward flow arrow on the side -->
      <path d="M -50 80 l 0 -130" stroke="#c96b83" stroke-width="1" stroke-dasharray="3 2"/>
      <path d="M -54 -42 l 4 -8 l 4 8" fill="none" stroke="#c96b83" stroke-width="1.2"/>
      <text x="-90" y="20" font-size="9" fill="#c96b83">血液</text>
      <text x="-90" y="32" font-size="9" fill="#c96b83">リンパ</text>
      <text x="-90" y="44" font-size="9" fill="#9a7d83">心臓へ</text>
    </g>

    <text x="20" y="200" font-size="9" fill="#9a7d83">▲ ふくらはぎは収縮ポンプとして体液を上に送り返す</text>
  </g>

  <!-- Bottom right: 60min flow & care advice -->
  <g transform="translate(410,295)" filter="url(#soft-aleg)">
    <rect width="350" height="220" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">CARE STRATEGY — ケアの組み立て</text>
    <line x1="20" y1="40" x2="200" y2="40" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(20,55)">
      <!-- focus pie hint -->
      <text x="0" y="14" font-size="10" fill="#c96b83" letter-spacing="2">時間配分の重点</text>
      <rect x="0" y="22" width="310" height="18" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.6"/>
      <rect x="0" y="22" width="124" height="18" fill="#eab5c0" stroke="#c96b83" stroke-width="0.6"/>
      <text x="62" y="35" text-anchor="middle" font-size="9" fill="#3a2e30">ふくらはぎ重点 12分</text>
      <text x="217" y="35" text-anchor="middle" font-size="9" fill="#5a4a4d">他部位 38分</text>

      <text x="0" y="65" font-size="10" fill="#c96b83" letter-spacing="2">セルフケア提案</text>
      <line x1="0" y1="73" x2="100" y2="73" stroke="#e8849a" stroke-width="0.6"/>
      <text x="0" y="92" font-size="10" fill="#3a2e30">・水分摂取（コップ4〜5杯目安）</text>
      <text x="0" y="108" font-size="10" fill="#3a2e30">・寝る時の脚挙上（5cm）</text>
      <text x="0" y="124" font-size="10" fill="#3a2e30">・着圧ソックス・足首回し</text>

      <rect x="0" y="135" width="310" height="32" fill="#fbe7ea" stroke="#c96b83" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="10" y="151" font-size="9" fill="#c96b83" letter-spacing="1">⚠ 片足だけ極端に腫れる・痛みを伴う・皮膚変色</text>
      <text x="10" y="163" font-size="9" fill="#9a7d83">→ 静脈血栓症の可能性 — 受診を勧める</text>
    </g>
  </g>
</svg>
