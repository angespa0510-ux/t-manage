<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="520" fill="url(#bg-h)"/>

  <!-- title -->
  <text x="400" y="48" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">HAND HYGIENE PROTOCOL</text>
  <text x="400" y="78" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">手指衛生 6 ステップ（30秒以上）</text>
  <line x1="370" y1="92" x2="430" y2="92" stroke="#e8849a" stroke-width="1"/>

  <!-- 6 panels in 3x2 grid -->
  <!-- Panel template: each 220x180 with hand pictogram -->

  <!-- Panel 1: 手のひら -->
  <g transform="translate(50,120)" filter="url(#soft)">
    <rect width="220" height="180" rx="0" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">STEP 01</text>
    <text x="200" y="30" text-anchor="end" font-size="9" fill="#9a7d83" letter-spacing="1">5秒</text>
    <!-- two palms together -->
    <g transform="translate(110,100)" stroke="#c96b83" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- left hand -->
      <path d="M -45 -20 q -8 -8 -8 -18 q 0 -10 6 -10 q 6 0 6 10 l 0 12 l 6 -22 q 2 -8 8 -8 q 6 0 4 10 l -4 22 l 8 -18 q 2 -6 8 -4 q 6 2 2 10 l -8 22 l 6 -8 q 4 -4 8 0 q 4 4 0 10 l -10 18 q -8 8 -18 6 q -10 -2 -14 -10 z"/>
      <!-- right hand -->
      <path d="M 45 -20 q 8 -8 8 -18 q 0 -10 -6 -10 q -6 0 -6 10 l 0 12 l -6 -22 q -2 -8 -8 -8 q -6 0 -4 10 l 4 22 l -8 -18 q -2 -6 -8 -4 q -6 2 -2 10 l 8 22 l -6 -8 q -4 -4 -8 0 q -4 4 0 10 l 10 18 q 8 8 18 6 q 10 -2 14 -10 z"/>
    </g>
    <text x="110" y="155" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="2">手のひらをこすり合わせる</text>
  </g>

  <!-- Panel 2: 手の甲 -->
  <g transform="translate(290,120)" filter="url(#soft)">
    <rect width="220" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">STEP 02</text>
    <text x="200" y="30" text-anchor="end" font-size="9" fill="#9a7d83" letter-spacing="1">5秒</text>
    <g transform="translate(110,100)" stroke="#c96b83" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- one hand on top of another -->
      <path d="M -50 -5 q 0 -28 16 -28 l 28 0 q 16 0 16 14 l 0 28 q 0 14 -16 14 l -28 0 q -16 0 -16 -14 z"/>
      <path d="M -45 -5 l 4 -8 l 6 0 l -2 8 M -32 -8 l 4 -10 l 6 0 l -2 10 M -19 -10 l 4 -12 l 6 0 l -2 12 M -6 -10 l 4 -10 l 6 0 l -2 10"/>
      <path d="M -10 8 q 0 -6 8 -6 l 30 0 q 8 0 8 6 l 0 22 q 0 6 -8 6 l -30 0 q -8 0 -8 -6 z" fill="#fdf6f7"/>
    </g>
    <text x="110" y="155" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="2">手の甲を伸ばすように洗う</text>
  </g>

  <!-- Panel 3: 指の間 -->
  <g transform="translate(530,120)" filter="url(#soft)">
    <rect width="220" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">STEP 03</text>
    <text x="200" y="30" text-anchor="end" font-size="9" fill="#9a7d83" letter-spacing="1">5秒</text>
    <g transform="translate(110,100)" stroke="#c96b83" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- interlaced fingers -->
      <path d="M -40 -25 l 0 30 q 0 10 10 10 l 60 0 q 10 0 10 -10 l 0 -30"/>
      <path d="M -28 -20 l 0 24 M -14 -25 l 0 28 M 0 -22 l 0 26 M 14 -25 l 0 28 M 28 -20 l 0 24"/>
      <path d="M -34 5 l 4 12 q 2 6 8 6 l 44 0 q 6 0 8 -6 l 4 -12"/>
    </g>
    <text x="110" y="155" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="2">指を組んで指の間を洗う</text>
  </g>

  <!-- Panel 4: 親指 -->
  <g transform="translate(50,320)" filter="url(#soft)">
    <rect width="220" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">STEP 04</text>
    <text x="200" y="30" text-anchor="end" font-size="9" fill="#9a7d83" letter-spacing="1">5秒</text>
    <g transform="translate(110,100)" stroke="#c96b83" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- thumb wrapped by other hand -->
      <path d="M -35 -10 q 0 -22 14 -22 l 18 0 q 8 0 8 8 l 0 26 q 0 8 -8 8 l -18 0 q -14 0 -14 -8 z"/>
      <ellipse cx="-25" cy="-22" rx="6" ry="14" transform="rotate(-15 -25 -22)"/>
      <path d="M 5 0 q 18 0 28 12 q 6 8 0 14 q -8 8 -22 4" fill="#fdf6f7"/>
    </g>
    <text x="110" y="155" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="2">親指を反対の手で包み洗う</text>
  </g>

  <!-- Panel 5: 指先・爪 -->
  <g transform="translate(290,320)" filter="url(#soft)">
    <rect width="220" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">STEP 05</text>
    <text x="200" y="30" text-anchor="end" font-size="9" fill="#9a7d83" letter-spacing="1">5秒</text>
    <g transform="translate(110,100)" stroke="#c96b83" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- fingertips into palm -->
      <path d="M -45 5 q 0 -20 14 -20 l 30 0 q 14 0 14 20 l 0 22 q 0 8 -10 8 l -38 0 q -10 0 -10 -8 z"/>
      <path d="M 0 -20 l -2 -10 M 8 -22 l 0 -12 M 16 -22 l 4 -10 M 24 -18 l 8 -6"/>
      <circle cx="0" cy="-30" r="3" fill="#c96b83"/>
      <circle cx="8" cy="-34" r="3" fill="#c96b83"/>
      <circle cx="20" cy="-32" r="3" fill="#c96b83"/>
      <circle cx="32" cy="-24" r="3" fill="#c96b83"/>
    </g>
    <text x="110" y="155" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="2">指先と爪の間を念入りに</text>
  </g>

  <!-- Panel 6: 手首 -->
  <g transform="translate(530,320)" filter="url(#soft)">
    <rect width="220" height="180" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">STEP 06</text>
    <text x="200" y="30" text-anchor="end" font-size="9" fill="#9a7d83" letter-spacing="1">5秒</text>
    <g transform="translate(110,100)" stroke="#c96b83" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- wrist -->
      <path d="M -20 -25 q 0 -12 14 -12 l 12 0 q 14 0 14 12 l 0 16 l 14 0 q 8 0 8 8 l 0 22 q 0 8 -8 8 l -50 0 q -8 0 -8 -8 z"/>
      <path d="M 20 -8 q 14 0 18 -4 q 4 -4 0 -8" fill="none"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke-dasharray="2 3" stroke-width="1.2"/>
      <line x1="-15" y1="6" x2="15" y2="6" stroke-dasharray="2 3" stroke-width="1.2"/>
    </g>
    <text x="110" y="155" text-anchor="middle" font-size="13" fill="#3a2e30" letter-spacing="2">手首までしっかり洗う</text>
  </g>

  <!-- footer note -->
  <text x="400" y="500" text-anchor="middle" font-size="10" fill="#9a7d83" letter-spacing="2">流水と石けんで合計30秒以上 → 清潔なペーパータオルで水分を拭き取る → アルコール消毒で仕上げ</text>
</svg>
