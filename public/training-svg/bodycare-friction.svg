<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-bf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <filter id="soft-bf" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-bf)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">FIVE FUNDAMENTAL TECHNIQUES</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">5つの基本手技 — 速度・圧・主目的</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- 5 cards in horizontal layout -->
  <!-- Card 1: 摩擦法 -->
  <g transform="translate(40,120)" filter="url(#soft-bf)">
    <rect width="140" height="320" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">EFFLEURAGE</text>
    <text x="70" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">摩擦法</text>
    <line x1="55" y1="60" x2="85" y2="60" stroke="#e8849a" stroke-width="1"/>

    <!-- horizontal sliding hand -->
    <g transform="translate(70,110)">
      <ellipse cx="0" cy="0" rx="32" ry="18" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <path d="M -45 0 l 90 0" stroke="#c96b83" stroke-width="1.2" stroke-dasharray="3 2"/>
      <path d="M 45 -5 l 8 5 l -8 5" fill="none" stroke="#c96b83" stroke-width="1.2"/>
    </g>

    <text x="70" y="180" text-anchor="middle" font-size="10" fill="#9a7d83">速度: 中</text>
    <text x="70" y="198" text-anchor="middle" font-size="10" fill="#9a7d83">圧: 弱〜中</text>
    <text x="70" y="232" text-anchor="middle" font-size="11" fill="#3a2e30">表層の血流</text>
    <text x="70" y="248" text-anchor="middle" font-size="11" fill="#3a2e30">なじませ</text>
    <text x="70" y="285" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">施術の始まり/終わり</text>
  </g>

  <!-- Card 2: 揉捏法 -->
  <g transform="translate(190,120)" filter="url(#soft-bf)">
    <rect width="140" height="320" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">PETRISSAGE</text>
    <text x="70" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">揉捏法</text>
    <line x1="55" y1="60" x2="85" y2="60" stroke="#e8849a" stroke-width="1"/>

    <!-- two pinching hands -->
    <g transform="translate(70,110)">
      <ellipse cx="-15" cy="0" rx="16" ry="12" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <ellipse cx="15" cy="0" rx="16" ry="12" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <path d="M -30 -15 q -10 15 0 30" fill="none" stroke="#c96b83" stroke-width="1" stroke-dasharray="2 2"/>
      <path d="M 30 -15 q 10 15 0 30" fill="none" stroke="#c96b83" stroke-width="1" stroke-dasharray="2 2"/>
    </g>

    <text x="70" y="180" text-anchor="middle" font-size="10" fill="#9a7d83">速度: 中</text>
    <text x="70" y="198" text-anchor="middle" font-size="10" fill="#9a7d83">圧: 中</text>
    <text x="70" y="232" text-anchor="middle" font-size="11" fill="#3a2e30">筋肉の血流</text>
    <text x="70" y="248" text-anchor="middle" font-size="11" fill="#3a2e30">促進</text>
    <text x="70" y="285" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">中層へのアプローチ</text>
  </g>

  <!-- Card 3: 圧迫法 -->
  <g transform="translate(340,120)" filter="url(#soft-bf)">
    <rect width="140" height="320" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">COMPRESSION</text>
    <text x="70" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">圧迫法</text>
    <line x1="55" y1="60" x2="85" y2="60" stroke="#e8849a" stroke-width="1"/>

    <!-- vertical pressing hand -->
    <g transform="translate(70,110)">
      <ellipse cx="0" cy="5" rx="28" ry="16" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <path d="M 0 -25 l 0 18 M -5 -10 l 5 6 l 5 -6" fill="none" stroke="#c96b83" stroke-width="1.2"/>
    </g>

    <text x="70" y="180" text-anchor="middle" font-size="10" fill="#9a7d83">速度: 遅</text>
    <text x="70" y="198" text-anchor="middle" font-size="10" fill="#9a7d83">圧: 中〜強</text>
    <text x="70" y="232" text-anchor="middle" font-size="11" fill="#3a2e30">深部の緊張</text>
    <text x="70" y="248" text-anchor="middle" font-size="11" fill="#3a2e30">緩和</text>
    <text x="70" y="285" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">3〜5秒キープ</text>
  </g>

  <!-- Card 4: 振動法 -->
  <g transform="translate(490,120)" filter="url(#soft-bf)">
    <rect width="140" height="320" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">VIBRATION</text>
    <text x="70" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">振動法</text>
    <line x1="55" y1="60" x2="85" y2="60" stroke="#e8849a" stroke-width="1"/>

    <!-- vibration waves around hand -->
    <g transform="translate(70,110)">
      <ellipse cx="0" cy="0" rx="22" ry="14" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <path d="M -38 -8 q -4 8 0 16 M -45 -12 q -8 12 0 24 M 38 -8 q 4 8 0 16 M 45 -12 q 8 12 0 24" fill="none" stroke="#c96b83" stroke-width="1" stroke-dasharray="2 1.5"/>
    </g>

    <text x="70" y="180" text-anchor="middle" font-size="10" fill="#9a7d83">速度: 細かい</text>
    <text x="70" y="198" text-anchor="middle" font-size="10" fill="#9a7d83">圧: 中</text>
    <text x="70" y="232" text-anchor="middle" font-size="11" fill="#3a2e30">深部の緊張</text>
    <text x="70" y="248" text-anchor="middle" font-size="11" fill="#3a2e30">緩和（補助）</text>
    <text x="70" y="285" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">手首から細かく</text>
  </g>

  <!-- Card 5: 叩打法 -->
  <g transform="translate(640,120)" filter="url(#soft-bf)">
    <rect width="140" height="320" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83" font-weight="500">TAPOTEMENT</text>
    <text x="70" y="50" text-anchor="middle" font-size="14" fill="#3a2e30" letter-spacing="2">叩打法</text>
    <line x1="55" y1="60" x2="85" y2="60" stroke="#e8849a" stroke-width="1"/>

    <!-- tapping hand with bounce arrows -->
    <g transform="translate(70,110)">
      <ellipse cx="0" cy="0" rx="28" ry="16" fill="#fce8ec" stroke="#c96b83" stroke-width="1"/>
      <!-- bounce -->
      <path d="M 0 20 q -8 10 -16 0 M 0 20 q 8 10 16 0" fill="none" stroke="#c96b83" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="0" y="-22" text-anchor="middle" font-size="10" fill="#c96b83">♪</text>
      <text x="-22" y="-15" font-size="8" fill="#c96b83">♪</text>
      <text x="22" y="-15" font-size="8" fill="#c96b83">♪</text>
    </g>

    <text x="70" y="180" text-anchor="middle" font-size="10" fill="#9a7d83">速度: 速</text>
    <text x="70" y="198" text-anchor="middle" font-size="10" fill="#9a7d83">圧: 弱〜中</text>
    <text x="70" y="232" text-anchor="middle" font-size="11" fill="#3a2e30">活性化</text>
    <text x="70" y="248" text-anchor="middle" font-size="11" fill="#3a2e30">仕上げ</text>
    <text x="70" y="285" text-anchor="middle" font-size="9" fill="#c96b83" letter-spacing="1">手首のスナップで</text>
  </g>

  <!-- Note bar at the bottom -->
  <g transform="translate(80,475)">
    <text x="0" y="0" font-size="10" letter-spacing="2" fill="#c96b83" font-weight="500">COMBINATION FLOW</text>
    <line x1="0" y1="10" x2="640" y2="10" stroke="#e8849a55" stroke-width="0.6"/>
    <text x="0" y="30" font-size="11" fill="#3a2e30">摩擦法 → 揉捏法 → 圧迫法 → 振動法 → 揉捏法 → 叩打法 → 摩擦法</text>
    <text x="0" y="48" font-size="9" fill="#9a7d83">標準 30 分施術での配置例（リラックス目的の場合は叩打法を省略）</text>
  </g>
</svg>
