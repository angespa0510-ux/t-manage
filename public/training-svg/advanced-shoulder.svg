<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-ash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <linearGradient id="body-ash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8ec"/>
      <stop offset="100%" stop-color="#f5d4dc"/>
    </linearGradient>
    <filter id="soft-ash" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-ash)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">SHOULDER &amp; NECK INTENSIVE CARE</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">肩・首の集中ケア — デスクワーク疲労</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- Left: front/side view of upper body showing affected muscles -->
  <g transform="translate(60,115)" filter="url(#soft-ash)">
    <rect width="320" height="395" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">AFFECTED MUSCLES</text>
    <line x1="20" y1="40" x2="170" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- side view of seated forward-head posture -->
    <g transform="translate(160,200)">
      <!-- chair line -->
      <line x1="-50" y1="160" x2="80" y2="160" stroke="#d8a8b3" stroke-width="0.6"/>
      <!-- thigh -->
      <rect x="0" y="130" width="80" height="22" rx="4" fill="url(#body-ash)" stroke="#d8a8b3" stroke-width="1"/>
      <!-- torso (forward leaning) -->
      <path d="M -10 -20 q -8 80 10 150" stroke="#d8a8b3" stroke-width="0.8" fill="none"/>
      <path d="M 50 -20 q 8 80 -10 150" stroke="#d8a8b3" stroke-width="0.8" fill="none"/>
      <path d="M -10 -20 l 60 0 l -8 150 l -42 0 z" fill="url(#body-ash)" stroke="#d8a8b3" stroke-width="1"/>
      <!-- forward head -->
      <ellipse cx="-20" cy="-50" rx="22" ry="26" fill="url(#body-ash)" stroke="#d8a8b3" stroke-width="1"/>
      <!-- neck (long forward) -->
      <path d="M -8 -28 q -10 4 -12 -16" stroke="#d8a8b3" stroke-width="1" fill="url(#body-ash)"/>

      <!-- highlighted muscle areas -->
      <!-- 僧帽筋上部 (top of shoulders) -->
      <path d="M 0 -15 q 25 -8 50 0" stroke="#c96b83" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round"/>
      <!-- 肩甲挙筋 (back of neck) -->
      <path d="M 5 -20 q 8 12 4 30" stroke="#c96b83" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round"/>
      <!-- 後頭下筋群 (under the back of head) -->
      <ellipse cx="-3" cy="-32" rx="6" ry="3" fill="#c96b83" opacity="0.85"/>
      <!-- 大胸筋 (chest, shortened) -->
      <ellipse cx="-2" cy="20" rx="14" ry="8" fill="#eab5c0" opacity="0.7"/>

      <!-- labels with leader lines -->
      <line x1="50" y1="-15" x2="80" y2="-30" stroke="#c96b83" stroke-width="0.5"/>
      <text x="84" y="-28" font-size="9" fill="#c96b83">僧帽筋上部</text>
      <text x="84" y="-16" font-size="8" fill="#9a7d83">パンパンに張る</text>

      <line x1="9" y1="0" x2="-50" y2="-18" stroke="#c96b83" stroke-width="0.5"/>
      <text x="-130" y="-20" font-size="9" fill="#c96b83">肩甲挙筋</text>
      <text x="-130" y="-8" font-size="8" fill="#9a7d83">こわばる</text>

      <line x1="-3" y1="-32" x2="-50" y2="-50" stroke="#c96b83" stroke-width="0.5"/>
      <text x="-130" y="-52" font-size="9" fill="#c96b83">後頭下筋群</text>
      <text x="-130" y="-40" font-size="8" fill="#9a7d83">頭痛の原因</text>

      <line x1="-2" y1="20" x2="-50" y2="42" stroke="#eab5c0" stroke-width="0.5"/>
      <text x="-130" y="40" font-size="9" fill="#c96b83">大胸筋</text>
      <text x="-130" y="52" font-size="8" fill="#9a7d83">短縮（巻き肩）</text>
    </g>

    <text x="20" y="370" font-size="9" fill="#9a7d83">▲ 凝りだけでなく、短縮した胸前と弱化した背中中央もケア</text>
  </g>

  <!-- Right: 5-step approach + chain -->
  <g transform="translate(400,115)" filter="url(#soft-ash)">
    <rect width="360" height="395" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">CAUSE-EFFECT CHAIN</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(20,65)">
      <!-- Box 1 -->
      <rect x="0" y="0" width="320" height="38" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <text x="15" y="16" font-size="10" letter-spacing="2" fill="#c96b83">CAUSE</text>
      <text x="15" y="32" font-size="11" fill="#3a2e30">デスクワーク・スマホ姿勢</text>

      <path d="M 160 40 l 0 12" stroke="#c96b83" stroke-width="1"/>
      <path d="M 156 47 l 4 6 l 4 -6" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Box 2 -->
      <rect x="0" y="55" width="320" height="38" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <text x="15" y="71" font-size="10" letter-spacing="2" fill="#c96b83">RESULT 1</text>
      <text x="15" y="87" font-size="11" fill="#3a2e30">大胸筋・小胸筋の短縮（前傾姿勢）</text>

      <path d="M 160 95 l 0 12" stroke="#c96b83" stroke-width="1"/>
      <path d="M 156 102 l 4 6 l 4 -6" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Box 3 -->
      <rect x="0" y="110" width="320" height="38" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <text x="15" y="126" font-size="10" letter-spacing="2" fill="#c96b83">RESULT 2</text>
      <text x="15" y="142" font-size="11" fill="#3a2e30">菱形筋・僧帽筋下部の伸長・弱化</text>

      <path d="M 160 150 l 0 12" stroke="#c96b83" stroke-width="1"/>
      <path d="M 156 157 l 4 6 l 4 -6" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Box 4 -->
      <rect x="0" y="165" width="320" height="38" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <text x="15" y="181" font-size="10" letter-spacing="2" fill="#c96b83">RESULT 3</text>
      <text x="15" y="197" font-size="11" fill="#3a2e30">僧帽筋上部・肩甲挙筋の慢性収縮</text>

      <path d="M 160 205 l 0 12" stroke="#c96b83" stroke-width="1"/>
      <path d="M 156 212 l 4 6 l 4 -6" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Box 5 -->
      <rect x="0" y="220" width="320" height="38" fill="#fdf0f3" stroke="#c96b83" stroke-width="0.6"/>
      <text x="15" y="236" font-size="10" letter-spacing="2" fill="#c96b83">RESULT 4</text>
      <text x="15" y="252" font-size="11" fill="#3a2e30">後頭下筋群の緊張（頭の安定維持）</text>

      <path d="M 160 260 l 0 12" stroke="#c96b83" stroke-width="1"/>
      <path d="M 156 267 l 4 6 l 4 -6" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- Symptom box (highlighted) -->
      <rect x="0" y="275" width="320" height="40" fill="#eab5c0" stroke="#c96b83" stroke-width="0.8"/>
      <text x="15" y="291" font-size="10" letter-spacing="2" fill="#fff">SYMPTOM</text>
      <text x="15" y="308" font-size="11" fill="#3a2e30">肩こり・首こり・緊張型頭痛</text>
    </g>
  </g>
</svg>
