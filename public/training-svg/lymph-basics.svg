<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <linearGradient id="body-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8ec"/>
      <stop offset="100%" stop-color="#f5d4dc"/>
    </linearGradient>
    <radialGradient id="node-grad">
      <stop offset="0%" stop-color="#7eb8c4"/>
      <stop offset="100%" stop-color="#4a8a9a"/>
    </radialGradient>
  </defs>

  <rect width="800" height="560" fill="url(#bg-l)"/>

  <text x="400" y="42" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">LYMPHATIC SYSTEM OVERVIEW</text>
  <text x="400" y="72" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">リンパシステムの基礎</text>
  <line x1="370" y1="86" x2="430" y2="86" stroke="#e8849a" stroke-width="1"/>

  <!-- whole body silhouette -->
  <g transform="translate(330, 110)">
    <g fill="url(#body-l)" stroke="#d8a8b3" stroke-width="1.2">
      <ellipse cx="100" cy="22" rx="22" ry="26"/>
      <rect x="92" y="44" width="16" height="14"/>
      <path d="M 60 58 q 0 -4 12 -6 l 56 0 q 12 2 12 6 l 6 84 q 0 8 -8 10 l -76 0 q -8 -2 -8 -10 z"/>
      <path d="M 60 62 q -22 4 -28 30 l -6 80 q -2 12 4 12 l 12 0 q 4 0 6 -10 l 8 -50 q 6 -28 6 -50 z"/>
      <path d="M 140 62 q 22 4 28 30 l 6 80 q 2 12 -4 12 l -12 0 q -4 0 -6 -10 l -8 -50 q -6 -28 -6 -50 z"/>
      <path d="M 60 146 l 0 22 q 0 6 6 8 l 26 0 l 6 0 l 6 0 l 26 0 q 6 -2 6 -8 l 0 -22 z"/>
      <path d="M 70 172 l -2 130 q 0 6 6 6 l 12 0 q 6 0 6 -6 l 4 -130 z"/>
      <path d="M 130 172 l 2 130 q 0 6 -6 6 l -12 0 q -6 0 -6 -6 l -4 -130 z"/>
    </g>

    <!-- lymph vessels (thin lines) -->
    <g stroke="#7eb8c4" stroke-width="1.2" fill="none" opacity="0.7" stroke-dasharray="3 2">
      <!-- upper body network -->
      <path d="M 100 50 q -10 10 -20 30 l -6 60"/>
      <path d="M 100 50 q 10 10 20 30 l 6 60"/>
      <path d="M 100 60 l 0 90"/>
      <!-- arms -->
      <path d="M 80 70 q -20 6 -28 36 l -10 80"/>
      <path d="M 120 70 q 20 6 28 36 l 10 80"/>
      <!-- legs -->
      <path d="M 84 168 l -8 130"/>
      <path d="M 116 168 l 8 130"/>
      <!-- abdominal -->
      <path d="M 90 110 q 10 4 20 0"/>
      <path d="M 88 130 q 12 4 24 0"/>
    </g>

    <!-- main lymph nodes -->
    <!-- 頸部 cervical -->
    <circle cx="80" cy="48" r="5" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <circle cx="120" cy="48" r="5" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <!-- 鎖骨上 supraclavicular -->
    <circle cx="78" cy="62" r="4" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <circle cx="122" cy="62" r="4" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <!-- 腋窩 axillary -->
    <circle cx="62" cy="78" r="6" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <circle cx="138" cy="78" r="6" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <!-- 肘 -->
    <circle cx="44" cy="148" r="3" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <circle cx="156" cy="148" r="3" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <!-- 鼠径部 inguinal -->
    <circle cx="78" cy="160" r="6" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <circle cx="122" cy="160" r="6" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <!-- 膝裏 popliteal -->
    <circle cx="76" cy="290" r="3" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>
    <circle cx="124" cy="290" r="3" fill="url(#node-grad)" stroke="#4a8a9a" stroke-width="0.8"/>

    <!-- terminus arrows: 鎖骨下静脈角 -->
    <g stroke="#c96b83" stroke-width="1.4" fill="none">
      <path d="M 78 62 q -10 -10 -2 -18" marker-end="url(#arrow-l)"/>
      <path d="M 122 62 q 10 -10 2 -18" marker-end="url(#arrow-l)"/>
    </g>
    <defs>
      <marker id="arrow-l" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#c96b83"/>
      </marker>
    </defs>
  </g>

  <!-- left annotations -->
  <g font-size="11" fill="#3a2e30" letter-spacing="1">
    <line x1="408" y1="158" x2="280" y2="160" stroke="#4a8a9a" stroke-width="0.8"/>
    <text x="276" y="163" text-anchor="end">頸部リンパ節</text>
    <text x="276" y="177" text-anchor="end" font-size="9" fill="#9a7d83">頭部・首からの集合点</text>

    <line x1="392" y1="188" x2="280" y2="220" stroke="#4a8a9a" stroke-width="0.8"/>
    <text x="276" y="223" text-anchor="end">腋窩（えきか）リンパ節</text>
    <text x="276" y="237" text-anchor="end" font-size="9" fill="#9a7d83">上肢・胸部のフィルター</text>

    <line x1="408" y1="270" x2="280" y2="290" stroke="#4a8a9a" stroke-width="0.8"/>
    <text x="276" y="293" text-anchor="end">鼠径（そけい）リンパ節</text>
    <text x="276" y="307" text-anchor="end" font-size="9" fill="#9a7d83">下肢・骨盤のフィルター</text>

    <line x1="406" y1="400" x2="280" y2="400" stroke="#4a8a9a" stroke-width="0.8"/>
    <text x="276" y="403" text-anchor="end">膝窩（しっか）リンパ節</text>
    <text x="276" y="417" text-anchor="end" font-size="9" fill="#9a7d83">下腿のフィルター</text>
  </g>

  <!-- right info box -->
  <g transform="translate(560, 130)">
    <rect width="200" height="280" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="28" font-size="10" letter-spacing="3" fill="#c96b83" font-weight="500">KEY POINTS</text>
    <text x="20" y="50" font-size="11" fill="#3a2e30" letter-spacing="1">リンパの3つの役割</text>

    <g font-size="10" fill="#3a2e30" letter-spacing="0.5">
      <text x="20" y="76" font-weight="500" fill="#c96b83">1. 老廃物の回収</text>
      <text x="20" y="90" fill="#9a7d83">細胞間の余分な水分・</text>
      <text x="20" y="102" fill="#9a7d83">タンパク質を回収</text>

      <text x="20" y="128" font-weight="500" fill="#c96b83">2. 免疫機能</text>
      <text x="20" y="142" fill="#9a7d83">リンパ節で異物・細菌を</text>
      <text x="20" y="154" fill="#9a7d83">フィルタリング</text>

      <text x="20" y="180" font-weight="500" fill="#c96b83">3. 脂質の運搬</text>
      <text x="20" y="194" fill="#9a7d83">小腸で吸収した脂質を</text>
      <text x="20" y="206" fill="#9a7d83">血流に運ぶ</text>
    </g>

    <line x1="20" y1="226" x2="180" y2="226" stroke="#e8849a44"/>
    <text x="20" y="246" font-size="10" fill="#9a7d83" letter-spacing="1">流れの方向性：</text>
    <text x="20" y="262" font-size="10" fill="#3a2e30" letter-spacing="0.5">末梢 → 鎖骨下静脈角</text>
    <text x="20" y="276" font-size="9" fill="#9a7d83" letter-spacing="0.5">（最終的に静脈に合流）</text>
  </g>

  <text x="400" y="540" text-anchor="middle" font-size="10" fill="#9a7d83" letter-spacing="2">○ がリンパ節 — 体内に約600〜800個。施術ではこれらを意識して流れを促す。</text>
</svg>
