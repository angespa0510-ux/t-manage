<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Noto Serif JP', serif">
  <defs>
    <linearGradient id="bg-arb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f7"/>
      <stop offset="100%" stop-color="#f9eef0"/>
    </linearGradient>
    <filter id="soft-arb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="540" fill="url(#bg-arb)"/>

  <text x="400" y="44" text-anchor="middle" font-size="13" letter-spacing="6" fill="#c96b83" font-weight="500">AROMA TREATMENT — STANDARD FLOW</text>
  <text x="400" y="74" text-anchor="middle" font-size="20" fill="#3a2e30" letter-spacing="3">アロマトリートメント — 基本フロー</text>
  <line x1="370" y1="88" x2="430" y2="88" stroke="#e8849a" stroke-width="1"/>

  <!-- Top: 4 senses environmental setup -->
  <g transform="translate(40,115)" filter="url(#soft-arb)">
    <rect width="720" height="170" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">FIVE SENSES — 五感の環境設定</text>
    <line x1="20" y1="40" x2="200" y2="40" stroke="#e8849a" stroke-width="1"/>

    <!-- 4 sense cards -->
    <g transform="translate(40,60)">
      <!-- 視覚 -->
      <g>
        <rect x="0" y="0" width="150" height="90" fill="#fdf0f3" stroke="#e8849a55"/>
        <text x="75" y="20" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83">SIGHT</text>
        <text x="75" y="40" text-anchor="middle" font-size="13" fill="#3a2e30">視覚</text>
        <line x1="60" y1="48" x2="90" y2="48" stroke="#e8849a" stroke-width="0.6"/>
        <text x="75" y="65" text-anchor="middle" font-size="9" fill="#5a4a4d">暗めの暖色系</text>
        <text x="75" y="80" text-anchor="middle" font-size="9" fill="#5a4a4d">装飾は最小限</text>
      </g>
      <!-- 聴覚 -->
      <g transform="translate(160,0)">
        <rect x="0" y="0" width="150" height="90" fill="#fdf0f3" stroke="#e8849a55"/>
        <text x="75" y="20" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83">HEARING</text>
        <text x="75" y="40" text-anchor="middle" font-size="13" fill="#3a2e30">聴覚</text>
        <line x1="60" y1="48" x2="90" y2="48" stroke="#e8849a" stroke-width="0.6"/>
        <text x="75" y="65" text-anchor="middle" font-size="9" fill="#5a4a4d">ヒーリング・自然音</text>
        <text x="75" y="80" text-anchor="middle" font-size="9" fill="#5a4a4d">音量は小さめ</text>
      </g>
      <!-- 嗅覚 -->
      <g transform="translate(320,0)">
        <rect x="0" y="0" width="150" height="90" fill="#eab5c0" stroke="#c96b83" stroke-width="0.8"/>
        <text x="75" y="20" text-anchor="middle" font-size="9" letter-spacing="2" fill="#fff">SCENT ✦</text>
        <text x="75" y="40" text-anchor="middle" font-size="13" fill="#3a2e30">嗅覚（主役）</text>
        <line x1="60" y1="48" x2="90" y2="48" stroke="#c96b83" stroke-width="0.6"/>
        <text x="75" y="65" text-anchor="middle" font-size="9" fill="#3a2e30">15分前からセット</text>
        <text x="75" y="80" text-anchor="middle" font-size="9" fill="#3a2e30">微かに香る程度</text>
      </g>
      <!-- 触覚 -->
      <g transform="translate(480,0)">
        <rect x="0" y="0" width="150" height="90" fill="#fdf0f3" stroke="#e8849a55"/>
        <text x="75" y="20" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c96b83">TOUCH</text>
        <text x="75" y="40" text-anchor="middle" font-size="13" fill="#3a2e30">触覚</text>
        <line x1="60" y1="48" x2="90" y2="48" stroke="#e8849a" stroke-width="0.6"/>
        <text x="75" y="65" text-anchor="middle" font-size="9" fill="#5a4a4d">室温 24〜26°C</text>
        <text x="75" y="80" text-anchor="middle" font-size="9" fill="#5a4a4d">柔らかいシーツ</text>
      </g>
    </g>
  </g>

  <!-- Bottom: 60 min flow chain -->
  <g transform="translate(40,310)" filter="url(#soft-arb)">
    <rect width="720" height="200" fill="#ffffff" stroke="#e8849a55" stroke-width="1"/>
    <text x="20" y="30" font-size="11" letter-spacing="3" fill="#c96b83" font-weight="500">60 MIN STANDARD FLOW</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#e8849a" stroke-width="1"/>

    <g transform="translate(40,75)">
      <!-- step 1: 香り選定 -->
      <rect x="0" y="0" width="80" height="50" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="40" y="20" text-anchor="middle" font-size="10" fill="#3a2e30">香り選定</text>
      <text x="40" y="36" text-anchor="middle" font-size="9" fill="#9a7d83">3種から</text>
      <text x="40" y="48" text-anchor="middle" font-size="8" fill="#9a7d83">3分</text>

      <path d="M 82 25 l 16 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 95 21 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- step 2: うつ伏せ・背中腰 -->
      <rect x="100" y="0" width="120" height="50" fill="#eab5c0" stroke="#c96b83" stroke-width="0.8"/>
      <text x="160" y="18" text-anchor="middle" font-size="10" fill="#3a2e30">うつ伏せ</text>
      <text x="160" y="32" text-anchor="middle" font-size="9" fill="#3a2e30">背中・腰（中心）</text>
      <text x="160" y="46" text-anchor="middle" font-size="8" fill="#fff">20分</text>

      <path d="M 222 25 l 16 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 235 21 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- step 3: デコルテ・腕 -->
      <rect x="240" y="0" width="100" height="50" fill="#f5d0d7" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="290" y="20" text-anchor="middle" font-size="10" fill="#3a2e30">デコルテ・腕</text>
      <text x="290" y="36" text-anchor="middle" font-size="9" fill="#9a7d83">仰向け</text>
      <text x="290" y="48" text-anchor="middle" font-size="8" fill="#9a7d83">10分</text>

      <path d="M 342 25 l 16 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 355 21 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- step 4: 脚の前面 -->
      <rect x="360" y="0" width="80" height="50" fill="#fbe7ea" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="400" y="20" text-anchor="middle" font-size="10" fill="#3a2e30">脚の前面</text>
      <text x="400" y="36" text-anchor="middle" font-size="9" fill="#9a7d83">膝→鼠径</text>
      <text x="400" y="48" text-anchor="middle" font-size="8" fill="#9a7d83">8分</text>

      <path d="M 442 25 l 16 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 455 21 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- step 5: 顔頭皮 (希望者のみ) -->
      <rect x="460" y="0" width="80" height="50" fill="#fce8ec" stroke="#d8a8b3" stroke-width="0.6" stroke-dasharray="2 2"/>
      <text x="500" y="20" text-anchor="middle" font-size="10" fill="#3a2e30">顔・頭皮</text>
      <text x="500" y="36" text-anchor="middle" font-size="9" fill="#9a7d83">希望者のみ</text>
      <text x="500" y="48" text-anchor="middle" font-size="8" fill="#9a7d83">5分</text>

      <path d="M 542 25 l 16 0" stroke="#c96b83" stroke-width="1"/>
      <path d="M 555 21 l 6 4 l -6 4" fill="none" stroke="#c96b83" stroke-width="1"/>

      <!-- step 6: 仕上げ -->
      <rect x="560" y="0" width="80" height="50" fill="#fdf0f3" stroke="#d8a8b3" stroke-width="0.6"/>
      <text x="600" y="20" text-anchor="middle" font-size="10" fill="#3a2e30">仕上げ</text>
      <text x="600" y="36" text-anchor="middle" font-size="9" fill="#9a7d83">起き上がり</text>
      <text x="600" y="48" text-anchor="middle" font-size="8" fill="#9a7d83">2分</text>
    </g>

    <!-- principle bar -->
    <g transform="translate(40,150)">
      <text x="0" y="0" font-size="11" fill="#c96b83" letter-spacing="2">▲ アロマの本質</text>
      <text x="0" y="20" font-size="10" fill="#3a2e30">エフルラージュ（軽擦法）が中心 — 50%以上 / 圧は弱〜中 / 動作は流れるように途切れない</text>
      <text x="0" y="36" font-size="9" fill="#9a7d83">「整える施術」ではなく「満たす施術」— 言葉より沈黙、香りと触感を主役に</text>
    </g>
  </g>
</svg>
